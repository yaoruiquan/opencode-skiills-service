services:
  opencode-server:
    build:
      context: ./opencode-server
      args:
        OPENCODE_IMAGE: ${OPENCODE_BASE_IMAGE:-node:22-bookworm-slim}
    image: opencode-skills-service-opencode:local
    container_name: opencode-skills-server
    env_file:
      - .env
    ports:
      - "127.0.0.1:4096:4096"
    environment:
      NODE_ENV: production
      CHROME_DEVTOOLS_CNVD_HOST: ${CHROME_DEVTOOLS_CNVD_HOST:-browser-cnvd}
      CHROME_DEVTOOLS_CNNVD_HOST: ${CHROME_DEVTOOLS_CNNVD_HOST:-browser-cnnvd}
      CHROME_DEVTOOLS_NCC_HOST: ${CHROME_DEVTOOLS_NCC_HOST:-browser-ncc}
      CHROME_DEVTOOLS_CNVD_PORT: ${CHROME_DEVTOOLS_CNVD_PORT:-9332}
      CHROME_DEVTOOLS_CNNVD_PORT: ${CHROME_DEVTOOLS_CNNVD_PORT:-9333}
      CHROME_DEVTOOLS_NCC_PORT: ${CHROME_DEVTOOLS_NCC_PORT:-9334}
    volumes:
      - ${SKILLS_HOST_DIR:-/Users/yao/.claude/skills}:/root/.agents/skills:ro
      - ./config/opencode.template.json:/opt/opencode/templates/opencode.template.json:ro
      - opencode-config:/root/.config/opencode
      - ../vulns:/data/input:ro
      - ./data/work:/data/work
      - ./data/output:/data/output
      - opencode-state:/root/.local/share/opencode
    entrypoint:
      - /usr/local/bin/start-opencode.sh
    command:
      - serve
      - --hostname
      - 0.0.0.0
      - --port
      - "4096"
      - --print-logs

  skills-api:
    image: opencode-skills-service-opencode:local
    container_name: opencode-skills-api
    depends_on:
      - opencode-server
    env_file:
      - .env
    ports:
      - "127.0.0.1:4100:4100"
    environment:
      NODE_ENV: production
      SKILLS_API_PORT: "4100"
      SKILLS_API_JOBS_ROOT: /data/work/jobs
      SKILLS_API_SKILL_ROOT: /root/.agents/skills
      OPENCODE_SERVER_URL: http://opencode-server:4096
      OPENCODE_RUN_MODEL: ${OPENCODE_PROVIDER_ID:-deepseek-anthropic}/${OPENCODE_MODEL:-deepseek-v4-flash}
      OPENCODE_FALLBACK_MODELS: ${OPENCODE_FALLBACK_MODELS:-deepseek-anthropic/deepseek-v4-pro}
      OPENCODE_CAPACITY_RETRIES: ${OPENCODE_CAPACITY_RETRIES:-1}
      OPENCODE_CAPACITY_RETRY_DELAY_MS: ${OPENCODE_CAPACITY_RETRY_DELAY_MS:-5000}
      CHROME_DEVTOOLS_CNVD_HOST: ${CHROME_DEVTOOLS_CNVD_HOST:-browser-cnvd}
      CHROME_DEVTOOLS_CNNVD_HOST: ${CHROME_DEVTOOLS_CNNVD_HOST:-browser-cnnvd}
      CHROME_DEVTOOLS_NCC_HOST: ${CHROME_DEVTOOLS_NCC_HOST:-browser-ncc}
      CHROME_DEVTOOLS_CNVD_PORT: ${CHROME_DEVTOOLS_CNVD_PORT:-9332}
      CHROME_DEVTOOLS_CNNVD_PORT: ${CHROME_DEVTOOLS_CNNVD_PORT:-9333}
      CHROME_DEVTOOLS_NCC_PORT: ${CHROME_DEVTOOLS_NCC_PORT:-9334}
    volumes:
      - ./backend:/app:ro
      - ${SKILLS_HOST_DIR:-/Users/yao/.claude/skills}:/root/.agents/skills:ro
      - ./data/work:/data/work
      - ./data/output:/data/output
    entrypoint:
      - node
      - /app/server.js

  frontend:
    build:
      context: ./frontend
    image: opencode-skills-service-frontend:local
    container_name: opencode-skills-frontend
    depends_on:
      - skills-api
    ports:
      - "127.0.0.1:4101:80"

  # Vue development server (optional, use for hot reload during development)
  frontend-dev:
    profiles:
      - dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: opencode-skills-frontend-dev
    depends_on:
      - skills-api
    ports:
      - "127.0.0.1:4101:4101"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://skills-api:4100
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    entrypoint:
      - npm
      - run
      - dev

  browser-cnvd:
    profiles:
      - docker-browser
    build: ./browser-service
    container_name: opencode-browser-cnvd
    environment:
      CHROME_REMOTE_DEBUGGING_PORT: "9332"
      CHROME_PROFILE_DIR: /home/chrome/profile
      CHROME_EXTERNAL_HOSTNAME: "browser-cnvd"
    ports:
      - "127.0.0.1:19332:9332"
    volumes:
      - ./data/docker-chrome-profiles/cnvd-report:/home/chrome/profile
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${CHROME_REMOTE_DEBUGGING_PORT}/json/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  browser-cnnvd:
    profiles:
      - docker-browser
    build: ./browser-service
    container_name: opencode-browser-cnnvd
    environment:
      CHROME_REMOTE_DEBUGGING_PORT: "9333"
      CHROME_PROFILE_DIR: /home/chrome/profile
      CHROME_EXTERNAL_HOSTNAME: "browser-cnnvd"
    ports:
      - "127.0.0.1:19333:9333"
    volumes:
      - ./data/docker-chrome-profiles/cnnvd-report:/home/chrome/profile
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${CHROME_REMOTE_DEBUGGING_PORT}/json/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  browser-ncc:
    profiles:
      - docker-browser
    build: ./browser-service
    container_name: opencode-browser-ncc
    environment:
      CHROME_REMOTE_DEBUGGING_PORT: "9334"
      CHROME_PROFILE_DIR: /home/chrome/profile
      CHROME_EXTERNAL_HOSTNAME: "browser-ncc"
    ports:
      - "127.0.0.1:19334:9334"
    volumes:
      - ./data/docker-chrome-profiles/ncc-report:/home/chrome/profile
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${CHROME_REMOTE_DEBUGGING_PORT}/json/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  opencode-config:
  opencode-state:
