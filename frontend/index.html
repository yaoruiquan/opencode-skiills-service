<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenCode Skills 任务控制台</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">OpenCode Skills 服务</p>
          <h1>自动化任务台</h1>
          <p class="subtitle">按模板创建独立 job，上传输入，运行并下载输出。</p>
        </div>
        <div class="api-strip">
          <label for="apiBase">API 地址</label>
          <input id="apiBase" type="url" value="http://127.0.0.1:4100">
          <button id="saveApi" type="button">保存</button>
        </div>
      </header>

      <main class="workspace">
        <section class="workbench" aria-label="任务编辑器">
          <div class="toolbar">
            <label>
              任务模板
              <select id="template">
                <option value="md2wechat">公众号转换</option>
                <option value="custom">自定义</option>
                <option value="vulnerability-alert-processor">漏洞预警材料</option>
                <option value="phase1-material-processor">材料整理</option>
                <option value="msrc-vulnerability-report">MSRC 预警报告</option>
                <option value="cnvd-weekly-db-update">CNVD 周库更新</option>
                <option value="phase2-cnvd-report">CNVD 上报</option>
                <option value="phase2-cnnvd-report">CNNVD 上报</option>
                <option value="phase2-ncc-report">NCC 上报</option>
              </select>
            </label>
            <label>
              任务标题
              <input id="title" type="text" value="公众号转换前端验证">
            </label>
            <button id="createJob" type="button">新建任务</button>
          </div>

          <section class="template-card" aria-label="模板说明">
            <div>
              <strong id="templateName">公众号转换</strong>
              <p id="templateDescription">将 article.md 转为公众号 HTML 和封面图。</p>
            </div>
            <div id="templateMeta" class="template-meta"></div>
          </section>

          <div id="markdownPanel" class="input-row">
            <label class="file-button" for="fileInput">选择 Markdown</label>
            <input id="fileInput" type="file" accept=".md,.markdown,text/markdown,text/plain">
            <button id="saveMarkdown" type="button">保存 article.md</button>
            <button id="runJob" type="button">运行任务</button>
          </div>

          <div id="materialsPanel" class="materials-panel">
            <div class="input-row">
              <label class="file-button" for="materialDirInput">上传材料目录</label>
              <input id="materialDirInput" type="file" multiple webkitdirectory>
              <label class="file-button" for="materialInput">追加文件</label>
              <input id="materialInput" type="file" multiple>
              <button id="saveMaterials" type="button">保存材料</button>
              <button id="runMaterialJob" type="button">运行当前模板</button>
            </div>
            <div class="materials-options">
              <label>
                执行模式
                <select id="mode"></select>
              </label>
              <label>
                任务备注
                <textarea id="taskBrief" spellcheck="false" placeholder="例如：批量处理 input/materials 下的 DAS-T 目录；或上报 DAS-T100001。"></textarea>
              </label>
            </div>
            <div id="selectedFiles" class="selected-files">尚未选择材料。</div>
          </div>

          <textarea id="markdown" spellcheck="false">![](./logo.JPG)

&gt; 近日安恒信息CERT监测到测试组件存在远程代码执行漏洞。

# 一、 漏洞信息

测试组件是测试产品。

&lt;table&gt;
  &lt;tr&gt;&lt;th&gt;漏洞标题&lt;/th&gt;&lt;th&gt;测试组件存在远程代码执行漏洞&lt;/th&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;漏洞处置等级&lt;/td&gt;&lt;td&gt;1级&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;CVSS3.1评分&lt;/td&gt;&lt;td&gt;9.8&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;CVE编号&lt;/td&gt;&lt;td&gt;CVE-2026-0001&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;安恒CERT编号&lt;/td&gt;&lt;td&gt;DM-202604-000001&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;Poc情况&lt;/td&gt;&lt;td&gt;已发现&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;Exp情况&lt;/td&gt;&lt;td&gt;未发现&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;在野利用&lt;/td&gt;&lt;td&gt;未发现&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;研究情况&lt;/td&gt;&lt;td&gt;已复现&lt;/td&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;危害描述&lt;/td&gt;&lt;td&gt;攻击者可远程执行代码。&lt;/td&gt;&lt;/tr&gt;
&lt;/table&gt;

## 漏洞描述

该漏洞源于输入校验不当。

# 二、 修复方案

官方修复方案:

升级至 2.0.1。

临时缓解方案:

- 限制公网访问。
- 启用 WAF 规则。

# 三、 参考资料

1. 厂商安全公告
2. https://example.com/advisory

# 四、 产品能力覆盖

&lt;table&gt;
  &lt;tr&gt;&lt;th&gt;产品名称&lt;/th&gt;&lt;th&gt;覆盖补丁包&lt;/th&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;WAF&lt;/td&gt;&lt;td&gt;已支持&lt;/td&gt;&lt;/tr&gt;
&lt;/table&gt;</textarea>

          <label id="promptWrap" class="prompt-wrap">
            自定义提示词
            <textarea id="prompt" spellcheck="false"></textarea>
          </label>
        </section>

        <aside class="side" aria-label="任务列表和状态">
          <section class="status-panel">
            <div class="status-head">
              <span id="statusDot" class="status-dot"></span>
              <span id="statusLabel">未选择任务</span>
            </div>
            <dl id="jobMeta"></dl>
          </section>

          <section class="jobs-panel">
            <div class="section-head">
              <h2>任务列表</h2>
              <button id="refreshJobs" type="button">刷新</button>
            </div>
            <div id="jobsList" class="jobs-list"></div>
          </section>
        </aside>
      </main>

      <section class="results" aria-label="日志和输出文件">
        <div class="section-head">
          <h2>输出文件</h2>
          <button id="refreshCurrent" type="button">刷新当前任务</button>
        </div>
        <div id="outputs" class="outputs"></div>

        <div class="log-tabs">
          <button class="tab is-active" type="button" data-log="stdout">标准输出</button>
          <button class="tab" type="button" data-log="stderr">错误输出</button>
        </div>
        <pre id="logs" class="logs"></pre>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
